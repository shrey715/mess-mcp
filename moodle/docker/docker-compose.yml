services:
  db:
    image: mysql:8.0
    container_name: onlyapps_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - moodle_net

  moodle:
    image: moodlehq/moodle-php-apache:8.1
    container_name: onlyapps_moodle
    ports:
      - "0.0.0.0:8085:80"
    volumes:
      - moodle_html:/var/www/html
      - moodle_data:/var/www/moodledata
      - ../plugin:/var/www/html/webservice/mcp:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodle_net

  # One-time installer container
  moodle_installer:
    image: moodlehq/moodle-php-apache:8.1
    container_name: onlyapps_installer
    volumes:
      - moodle_html:/var/www/html
      - moodle_data:/var/www/moodledata
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodle_net
    entrypoint: /bin/bash
    command: |
      -c "
      set -e

      # Check if already installed
      if [ -f /var/www/html/config.php ]; then
        echo 'Moodle already installed, skipping...'
        exit 0
      fi

      echo 'Downloading Moodle...'
      cd /var/www/html
      curl -L https://download.moodle.org/download.php/direct/stable405/moodle-latest-405.tgz | tar xz --strip-components=1

      echo 'Creating moodledata directory...'
      mkdir -p /var/www/moodledata
      chmod 777 /var/www/moodledata

      echo 'Running Moodle installer...'
      php admin/cli/install.php \
        --wwwroot=http://10.42.0.159:8085 \
        --dataroot=/var/www/moodledata \
        --dbtype=mysqli \
        --dbhost=db \
        --dbname=moodle \
        --dbuser=moodle \
        --dbpass=moodlepass \
        --fullname='OnlyApps Moodle' \
        --shortname='OnlyApps' \
        --adminuser=admin \
        --adminpass=Admin123! \
        --adminemail=admin@onlyapps.local \
        --agree-license \
        --non-interactive

      echo 'Configuring web services...'
      # Enable web services
      php admin/cli/cfg.php --name=enablewebservices --set=1
      
      # Install the MCP plugin
      if [ -d /var/www/html/webservice/mcp ]; then
        echo 'Installing MCP plugin...'
        php admin/cli/upgrade.php --non-interactive
        
        # Enable MCP protocol
        php admin/cli/cfg.php --name=webservice_mcp_enabled --set=1 || true
        
        echo 'MCP plugin installed and enabled!'
      fi

      echo 'Installation complete!'
      "

networks:
  moodle_net:
    driver: bridge

volumes:
  db_data:
    external: true
    name: onlyapps_db_data
  moodle_html:
    external: true
    name: onlyapps_moodle_html
  moodle_data:
    external: true
    name: onlyapps_moodle_data
