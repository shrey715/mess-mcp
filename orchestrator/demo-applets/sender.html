<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Applet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #6366f1;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #6366f1;
            color: #fff;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .row>* {
            flex: 1;
        }

        button {
            background: #6366f1;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        button:hover {
            background: #818cf8;
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button.calendar {
            background: #22c55e;
        }

        button.calendar:hover {
            background: #16a34a;
        }

        .log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry.sent {
            color: #22c55e;
        }

        .log-entry.received {
            color: #3b82f6;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(34, 197, 94, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #22c55e;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📤 IPC Sender</h1>
        <p class="subtitle">Send messages and calendar events via IPC Bridge</p>

        <div class="card">
            <h2>Connection Status</h2>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span id="statusText">Checking bridge...</span>
            </div>
        </div>

        <div class="card">
            <h2>Target Applet</h2>
            <input type="text" id="targetApplet" placeholder="Target Applet ID" value="unified-calendar">
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('message')">💬 Message</button>
                <button class="tab" onclick="switchTab('calendar')">📅 Calendar Event</button>
                <button class="tab" onclick="switchTab('doc')">📄 Document</button>
            </div>

            <!-- Message Tab -->
            <div class="tab-content active" id="tab-message">
                <label>Message Content</label>
                <textarea id="messageContent" placeholder="Enter your message here...">Hello from Sender! 👋</textarea>
                <button onclick="sendMessage()">Send Message</button>
            </div>

            <!-- Calendar Event Tab -->
            <div class="tab-content" id="tab-calendar">
                <label>Event Title</label>
                <input type="text" id="eventTitle" placeholder="Meeting title" value="Team Standup">

                <div class="row">
                    <div>
                        <label>Date</label>
                        <input type="date" id="eventDate">
                    </div>
                    <div>
                        <label>Time</label>
                        <input type="time" id="eventTime" value="10:00">
                    </div>
                    <div>
                        <label>Duration (min)</label>
                        <input type="number" id="eventDuration" value="30" min="5" max="480">
                    </div>
                </div>

                <label>Description (optional)</label>
                <textarea id="eventDescription" placeholder="Event description..."
                    rows="2">Daily team sync meeting</textarea>

                <label>Location (optional)</label>
                <input type="text" id="eventLocation" placeholder="Meeting room or video link"
                    value="Conference Room A">

                <button class="calendar" onclick="sendCalendarEvent()">📅 Send to Calendar</button>
                <button class="secondary" onclick="sendQuickEvent()">⚡ Quick Event (Now + 1hr)</button>
            </div>

            <!-- Document Tab -->
            <div class="tab-content" id="tab-doc">
                <label>Document Title</label>
                <input type="text" id="docTitle" placeholder="Document name" value="Q4 Report.pdf">

                <label>Document URL</label>
                <input type="text" id="docUrl" placeholder="https://..." value="https://example.com/docs/report.pdf">

                <button onclick="sendDocShare()">Share Document</button>
            </div>
        </div>

        <div class="card">
            <h2>Message Log</h2>
            <div class="log" id="log">
                <div class="log-entry">Waiting for activity...</div>
            </div>
        </div>
    </div>

    <script>
        const log = document.getElementById('log');
        const statusText = document.getElementById('statusText');

        // Set default date to today
        document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            document.querySelector(`.tab-content#tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // Check if bridge is available
        if (window.bridge) {
            statusText.textContent = 'Bridge connected!';
            addLog('Bridge API is available', 'sent');

            // Listen for incoming messages
            window.bridge.onReceive((message, senderId) => {
                addLog(`From ${senderId}: ${JSON.stringify(message)}`, 'received');
            });

            // Listen for broadcasts
            window.bridge.onBroadcast((message) => {
                addLog(`Broadcast: ${JSON.stringify(message)}`, 'received');
            });
        } else {
            statusText.textContent = 'Bridge not available';
            document.getElementById('status').style.background = 'rgba(239, 68, 68, 0.2)';
            document.getElementById('status').style.color = '#ef4444';
            addLog('Bridge API not available - running outside orchestrator', 'error');
        }

        async function sendMessage() {
            const target = document.getElementById('targetApplet').value;
            const content = document.getElementById('messageContent').value;

            if (!window.bridge) {
                addLog('Cannot send - bridge not available', 'error');
                return;
            }

            try {
                await window.bridge.send(target, {
                    type: 'MESSAGE',
                    payload: { text: content }
                });
                addLog(`Sent message to ${target}: "${content.substring(0, 50)}..."`, 'sent');
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function sendCalendarEvent() {
            const target = document.getElementById('targetApplet').value;

            if (!window.bridge) {
                addLog('Cannot send - bridge not available', 'error');
                return;
            }

            const title = document.getElementById('eventTitle').value;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const duration = parseInt(document.getElementById('eventDuration').value);
            const description = document.getElementById('eventDescription').value;
            const location = document.getElementById('eventLocation').value;

            // Create date object
            const startDate = new Date(`${date}T${time}`);

            const event = {
                type: 'CALENDAR_EVENT',
                payload: {
                    title: title,
                    start: startDate.getTime(),
                    duration: duration,
                    description: description,
                    location: location
                }
            };

            try {
                await window.bridge.send(target, event);
                addLog(`📅 Sent calendar event "${title}" to ${target}`, 'sent');
                addLog(`   Date: ${startDate.toLocaleString()}, Duration: ${duration}min`, 'sent');
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function sendQuickEvent() {
            const target = document.getElementById('targetApplet').value;

            if (!window.bridge) {
                addLog('Cannot send - bridge not available', 'error');
                return;
            }

            // Create event 1 hour from now
            const startTime = Date.now() + (60 * 60 * 1000);

            const event = {
                type: 'CALENDAR_EVENT',
                payload: {
                    title: 'Quick Meeting',
                    start: startTime,
                    duration: 30,
                    description: 'Quick meeting created via IPC'
                }
            };

            try {
                await window.bridge.send(target, event);
                addLog(`⚡ Sent quick event to ${target} (in 1 hour)`, 'sent');
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function sendDocShare() {
            const target = document.getElementById('targetApplet').value;

            if (!window.bridge) {
                addLog('Cannot send - bridge not available', 'error');
                return;
            }

            const title = document.getElementById('docTitle').value;
            const url = document.getElementById('docUrl').value;

            const doc = {
                type: 'DOC_SHARE',
                payload: {
                    title: title,
                    size: 1024 * 1024 * 2.5,
                    url: url
                }
            };

            try {
                await window.bridge.send(target, doc);
                addLog(`📄 Sent document "${title}" to ${target}`, 'sent');
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }
    </script>
</body>

</html>
