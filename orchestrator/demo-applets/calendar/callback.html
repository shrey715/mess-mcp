<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f17;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .success {
            color: #22c55e;
        }

        .error {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p id="status">Processing authentication...</p>
    </div>

    <script>
        // Parse the URL parameters
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        const statusEl = document.getElementById('status');
        const spinnerEl = document.getElementById('spinner');

        if (error) {
            // OAuth error
            spinnerEl.style.display = 'none';
            statusEl.className = 'error';
            statusEl.textContent = `Authentication failed: ${errorDescription || error}`;

            // Send error to parent
            if (window.opener) {
                window.opener.postMessage({
                    type: 'oauth_callback',
                    error: error,
                    error_description: errorDescription
                }, window.location.origin);
            }

            setTimeout(() => window.close(), 3000);
        } else if (code) {
            // Success - send code to parent window
            statusEl.textContent = 'Authentication successful! Closing...';
            statusEl.className = 'success';
            spinnerEl.style.display = 'none';

            if (window.opener) {
                window.opener.postMessage({
                    type: 'oauth_callback',
                    code: code,
                    state: state
                }, window.location.origin);
            }

            setTimeout(() => window.close(), 1000);
        } else {
            // No code or error - something went wrong
            spinnerEl.style.display = 'none';
            statusEl.className = 'error';
            statusEl.textContent = 'No authorization code received';

            setTimeout(() => window.close(), 3000);
        }
    </script>
</body>

</html>
