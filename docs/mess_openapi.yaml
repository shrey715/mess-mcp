components:
  schemas:
    Category:
      type: string
      enum:
        - registered
        - unregistered
        - guest
        - extra
    Meal:
      type: string
      enum:
        - breakfast
        - lunch
        - snacks
        - dinner
    Day:
      required: false
      type:
        - string
        - null
      enum:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        - Sunday
      nullable: true
    MessInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        short_name:
          type: string
        color:
          type: string
          description: >
            The color is an OKLCH value formatted as "l c h", i.e. the LCH
            values

            separated by a space. There is no alpha value in the color.


            To use it in CSS, you can do `color: oklch(mess.color)`,

            where `mess.color` is the mess's color.
        tags:
          $ref: '#/components/schemas/Tags'
        billing_id:
          type: integer
          description: >
            For messes with the same billing ID, information like number of
            scans

            and billing is to be summed.
        rating:
          type: number
          format: float
          description: >
            The average rating of the mess, according to user feedback in the
            past month.
        feedback_count:
          type: number
          description: The number of user feedback instances received in the past month.
    Tags:
      type: integer
      description: |
        This tag governs who is allowed to register to a mess, as
        well as what rates and capacities apply to them.

        It is used to separate users into different classes, with
        the goal of allowing users who are part of a class to
        register for a mess of that class with the rate for that class.
        Users can be a part of multiple classes.

        It is a 2-bit bit-flag described like so:

        | Bits | Description     |
        | :--- | :-------------- |
        | 0    | Mess of Class-A |
        | 1    | Mess of Class-B |

        In IIIT, Class-A is a student mess, and Class-B is a mess for staff.

        A user is allowed to register to the mess if this condition passes:
        ```
        user_tag & mess_tag != 0
        ```
    MessRate:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
        meal:
          $ref: '#/components/schemas/Meal'
        rate:
          type: integer
          example: 4210
        day:
          required: false
          $ref: '#/components/schemas/Day'
    MessCapacity:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
        meal:
          $ref: '#/components/schemas/Meal'
        capacity:
          type: integer
          example: 650
        day:
          required: false
          $ref: '#/components/schemas/Day'
    MealRegistration:
      type: object
      properties:
        meal_date:
          type: string
          format: date
          example: '1998-09-02'
        meal_type:
          $ref: '#/components/schemas/Meal'
        meal_mess:
          type: string
          example: kadamba-nonveg
        category:
          $ref: '#/components/schemas/Category'
        user_id:
          type: string
          example: '2024101010'
        registered_at:
          type: string
          format: date-time
          description: The time this registration was created/updated.
        cancelled_at:
          type: string
          required: false
          format: date-time
          description: '`null` if the meal isn''t cancelled'
          example: 2024-10-16T16-46-42
        availed_at:
          type: string
          required: false
          format: date-time
          description: '`null` if the meal isn''t availed'
          example: 2024-10-16T16-46-42
        availed_price:
          type: integer
          required: false
          description: '`null` if the meal isn''t availed. In paise'
          example: 4210
        monthly_reg:
          type: string
          required: false
          description: |
            The ID of the monthly registration, if this meal was
            availed as a monthly registration.
        metadata:
          type: object
          required: false
    ExtraItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          description: May be empty
        rate:
          type: number
          description: Price of the item in paise
        mess:
          type: string
          example: kadamba-nonveg
        food_tags:
          type: boolean
          description: Bit 0 -> is set if the food is nonveg
    ExtraRegistrationInserted:
      type: object
      properties:
        id:
          type: string
        extra:
          type: string
          description: ID of the extra item this registration corresponds to
        meal_date:
          type: string
          format: date
          example: '1998-09-02'
        meal_type:
          $ref: '#/components/schemas/Meal'
        meal_mess:
          type: string
          example: kadamba-nonveg
        user_id:
          type: string
          example: '2024101010'
        registered_at:
          type: string
          format: date-time
          description: The time this registration was created/updated.
        availed_at:
          type: string
          required: false
          format: date-time
          description: '`null` if the registration isn''t availed'
          example: 2024-10-16T16-46-42
        availed_price:
          type: integer
          required: false
          description: '`null` if the registration isn''t availed. In paise'
          example: 4210
        is_unregistered:
          type: boolean
          description: If this registration was made on-spot
    ExtraRegistration:
      allOf:
        - $ref: '#/components/schemas/ExtraRegistrationInserted'
        - type: object
          properties:
            extra_name:
              type: string
              description: Name of the extra item
            extra_description:
              type: string
              description: Description of the extra item
            extra_rate:
              type: string
              description: Price of the extra item in paise
            extra_food_tags:
              type: string
              description: Bit 0 -> set if the food is nonveg
    MonthlyRegistration:
      type: object
      properties:
        id:
          type: string
        meal_mess:
          type: string
          example: yuktahar
        user_id:
          type: string
          example: '2024101010'
        month:
          type: integer
          maximum: 12
          minimum: 1
          description: Month of the registration (1-12)
          example: 3
        year:
          type: integer
          maximum: 2098
          minimum: 2000
          description: 4-digit year of the registration
          example: 1998
    SnackAvailment:
      type: object
      properties:
        meal_date:
          type: string
          format: date
          example: '1998-09-02'
        meal_mess:
          type: string
          example: kadamba-nonveg
        user_id:
          type: string
          example: '2024101010'
        availed_at:
          type: string
          format: date-time
          description: The time this snack was availed.
        monthly_reg:
          type: string
          required: false
          description: ID of the associated monthly registration (if any)
    UserPreferences:
      type: object
      properties:
        notify_not_registered:
          type: boolean
          required: true
          description: Sends a reminder one day before the registration deadline
        notify_malloc_happened:
          type: boolean
          required: true
          description: Sends an email with meals if you've been randomly allocated
        auto_reset_token_daily:
          type: boolean
          required: true
          description: 'Resets the QR code automatically at 02:00 every day'
        enable_unregistered:
          type: boolean
          required: true
          description: Allow availing meals on-the-spot at unregistered rates
        nag_for_feedback:
          type: boolean
          required: true
          description: Prompts for feedback after every availed meal
    MealTiming:
      type: object
      description: Describes the timing for a single meal.
      properties:
        meal:
          type: string
          description: The name of the meal.
          enum:
            - breakfast
            - lunch
            - snacks
            - dinner
          example: breakfast
        start_time:
          type: string
          format: time
          description: 'The start time for the meal service in HH:mm:ss format.'
          example: '06:30:00'
        end_time:
          type: string
          format: time
          description: 'The end time for the meal service in HH:mm:ss format.'
          example: '10:30:00'
    MealRating:
      type: object
      properties:
        rating:
          type: number
          format: float
          example: 4.2
        count:
          type: integer
          example: 69
    Error:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          description: An error message.
    ErrorCode:
      type: string
      description: Error code (identifier)
      enum:
        - bad-request
        - unauthorized
        - forbidden
        - not-found
        - already-exists
        - invalid-range
        - internal-server-error
        - no-redirect-url
        - window-closed
        - not-registered
        - not-cancelled
        - not-availed
        - sync-failed
        - capacity-exceeded
        - cancellation-limit-exceeded
        - too-far-ahead
    AuthKey:
      type: object
      properties:
        name:
          type: string
          description: The API key common name.
        user_id:
          type: string
          description: The user's ID
        created_at:
          type: string
          format: date-time
          example: 2024-10-16T16-46-42
        expires_at:
          type: string
          format: date-time
          example: 2024-10-16T16-46-42
    User:
      type: object
      properties:
        id:
          type: string
          description: The unique ID of the user.
        name:
          type: string
          description: The user's full name.
        roll_number:
          type: string
          required: false
          description: The user's roll number.
        email:
          type: string
          description: The user's institute-provided email address.
        last_login_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        token:
          type: string
          description: The token provided to each user to verify themselves at the messes.
        attributes:
          type: string
          description: >
            The user's attributes. This is an 8-bit bit-flag described like so:


            | Bits | Description |

            | :--- | :---------- |

            | 0    | 1 if the user will be randomly allocated a meal when they
            don't register. |

            | 1    | 1 if the user is allowed to log in using a password. |

            | 2    | 1 if the user is allowed to log in using CAS. |

            | 3    | Reserved. |

            | 4-7  | A 4-bit number for the max. number of guests the user is
            allowed to bring with their registration |


            If the flag is set to 0, it essentially has the function of
            disabling the user's account.
        tags:
          $ref: '#/components/schemas/Tags'
  responses:
    Unauthorized:
      description: The user is not logged in.
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                      - type: object
                        properties:
                          code:
                            type: string
                            const: unauthorized
    NotFound:
      description: The requested entity was not found.
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                      - type: object
                        properties:
                          code:
                            type: string
                            const: not-found
    BadRequest:
      description: Sent request parameters are not valid.
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                      - type: object
                        properties:
                          code:
                            type: string
                            const: bad-request
    Forbidden:
      description: Performing this action is not allowed
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                      - type: object
                        properties:
                          code:
                            type: string
                            const: forbidden
    InternalServerError:
      description: An internal server error occured.
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                      - type: object
                        properties:
                          code:
                            type: string
                            const: internal-server-error
