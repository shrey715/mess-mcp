  /registrations/bill:
    get:
      summary: Get the mess bill for a month
      tags:
        - Registrations
        - Billing
      description: |
        Get the mess bill for a month of a year. The bill may be projected,
        i.e. it includes bills for meals that haven't happened yet. Projected
        bills are cached, since they are expensive to calculate, but the
        cache is cleared when registrations change. A 404 is returned if
        registrations have not been opened for that month yet.
      parameters:
        - name: year
          in: query
          required: false
          description: The 4-digit year (2000-2098). Defaults to current year.
          schema:
            type: integer
            maximum: 2028
            minimum: 2000
        - name: month
          in: query
          required: false
          description: The month of the year (1-12). Defaults to current month.
          schema:
            type: integer
            maximum: 12
            minimum: 1
      responses:
        '200':
          description: The bill.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      non_projected:
                        type: integer
                        example: 1000
                        description: >-
                          In paise. Non projected is the definite amount that
                          will be charged.
                      projected:
                        type: integer
                        example: 2000
                        description: >-
                          In paise. Projected is the amount that was calculated
                          based on future registrations.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations/scans:
    get:
      summary: Get meal availments count
      tags:
        - Registrations
      description: |
        Gets the aggregated count of meal availments for a specific meal at a 
        mess on a given date. This endpoint does not require authentication.

        If the `Accept` header is set to `text/event-stream`, the endpoint 
        establishes a Server-Sent Events (SSE) connection for real-time meal 
        scan events. SSE events contain only non-identifiable data: meal type,
        mess, and date.

        **SSE Mode:**
        - Set `Accept: text/event-stream` header to enable SSE streaming
        - On connection, a `connected` event is sent with empty data
        - Each meal scan triggers a `meal_scan` event with JSON data
        - The connection remains open until the client disconnects

        **SSE Event Format:**
        ```
        event: connected
        data: {}

        event: meal_scan
        data: {"meal":"breakfast","mess":"yuktahar","date":"2025-01-30"}
        ```
      parameters:
        - name: meal
          in: query
          description: The name of the meal.
          required: true
          schema:
            $ref: '#/components/schemas/Meal'
        - name: mess
          in: query
          description: The mess ID.
          required: true
          schema:
            type: string
            example: yuktahar
        - name: date
          in: query
          description: The date for which to fetch availments. Defaults to today.
          required: false
          schema:
            type: string
            format: date
            example: '1998-09-02'
      responses:
        '200':
          description: >
            **JSON Response** (default): The aggregated count of meal
            availments.


            **SSE Response** (when `Accept: text/event-stream`): A stream of 

            real-time meal scan events. The response body is a continuous 

            stream of SSE-formatted events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      meal:
                        $ref: '#/components/schemas/Meal'
                      mess:
                        type: string
                        example: yuktahar
                      date:
                        type: string
                        format: date
                        example: '2025-01-30'
                      total:
                        type: integer
                        description: The total number of meal availments for this meal.
                        example: 42
                      recent:
                        type: integer
                        description: The number of meal availments in the last 10 minutes.
                        example: 5
            text/event-stream:
              schema:
                type: string
                description: |
                  A stream of SSE events. Each event has an `event` field and 
                  a `data` field. The `meal_scan` event data is a JSON object 
                  with `meal`, `mess`, and `date` fields.
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
