$schema: 'https://spec.openapis.org/oas/3.1/schema/2022-10-07'
openapi: 3.1.1
info:
  title: Mess Management System API
  version: '2'
  summary: API Documentation for the Mess Management System
  description: >
    Please see the [tutorial on using MMS
    APIs](https://gitlab.iiit.ac.in/messcom/backend/-/blob/main/docs/tutorial.md).


    ## Rate Limits


    There are rudimentary rate limits put in place for every requests of **420
    times a second**. There are unfortunately

    no `X-RateLimit-*` headers sent with the request as of the time of writing,
    but if a request is rate limited, a

    `429 Too Many Requests` is sent, with the JSON body being the typical error
    response with the code "rate-limited".


    ## Changes in v2
     
    - `/api/mess/minimal` is removed and replaced by `/api/mess/info` and no
    longer returns rates

    - `/api/mess/menus` endpoint no longer requires a mess ID, it returns all
    the menus
  contact:
    name: Mess Portal Admins
    email: messportal.admins@students.iiit.ac.in
  license:
    name: GNU Affero General Public License 3.0
    identifier: AGPL-3.0
servers:
  - url: /api
    description: This server
  - url: 'https://mess.iiit.ac.in/api'
    description: Production server
tags:
  - name: Authentication
    description: Authentication endpoints
  - name: Mess
    description: 'Mess info, rates and capacity endpoints'
  - name: Registrations
    description: Meal registration and cancellation endpoints
  - name: Extras
    description: Extra item registrations and list endpoints
  - name: Config
    description: Configuration endpoints
  - name: Preferences
    description: User preference endpoints
  - name: Feedback
    description: Meal feedback and grievances endpoints
  - name: Billing
    description: Billing endpoints
paths:
  /auth/login/cas:
    get:
      summary: Login for IIIT Students
      description: >
        Redirects the user to the CAS login page. **The user must be redirected

        to this URL, it should not be called using AJAX.**


        After completing the authentication procedure, regardless of success or
        failure,

        the user will always be redirected back to the frontend. If an error has
        occured,

        the `error_code` and `error_message` query parameters will be set.
      tags:
        - Authentication
      response:
        '302':
          description: 'Redirects to the CAS login page, and then the frontend, always.'
  /auth/login/pass:
    post:
      summary: Login for MSIT Students/Interns
      description: >
        Logs in the user using the given username and password. This endpoint
        only works for MSIT students/interns, whose logins are managed by MMS.
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
                  format: email
                  required: true
                  description: The e-mail address of the student.
                  example: you@msitprogram.net
                pass:
                  type: string
                  format: password
                  required: true
                  description: 'The student''s password, in plaintext.'
                  example: correct-horse-battery-staple
      responses:
        '200':
          description: The logged in user's information.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Returned when a IIIT student attempts login.
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/logout:
    get:
      summary: Logout current user
      description: |
        Logs out the currently logged in user.
      tags:
        - Authentication
      responses:
        '302':
          description: >
            The user has been logged out successfully, and redirected to either

            the CAS logout page for CAS-authenticated users, or back to the

            frontend for other users. Note that the CAS logout page does not

            redirect back to the frontend.


            **The user must be redirected to this URL, it should not be called
            using AJAX.**
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/me:
    get:
      summary: Get logged in user
      description: >
        Get the currently logged in user's details. If there is no logged in
        user, it

        returns `401`.
      tags:
        - Authentication
      responses:
        '200':
          description: The user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/keys:
    get:
      summary: Get all auth keys
      tags:
        - Authentication
      responses:
        '200':
          description: 'The auth keys, including the expired ones.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuthKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create an auth key
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  required: true
                  description: A unique friendly name for the key
                expiry:
                  type: string
                  format: date
                  required: true
                  description: The date this key expires
                  example: '1998-09-02'
      responses:
        '200':
          description: The key
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/AuthKey'
                      - type: object
                        data:
                          key:
                            type: string
                            description: The created key
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A key with the same name already exists.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: already-exists
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/keys/info:
    get:
      summary: Get information about an auth key
      tags:
        - Authentication
      parameters:
        - name: authorization
          in: header
          schema:
            type: string
          description: The key
          required: true
          allowEmptyValue: false
      responses:
        '200':
          description: >-
            If the auth key is expired, it will return a HTTP 401 or HTTP 403
            error. Use the `/api/auth/keys` endpoint to list expired keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuthKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  '/auth/keys/{name}':
    delete:
      summary: Delete the auth key
      description: 'The auth key is identified by its **name**, not the key itself.'
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: The name of the key
          required: true
          allowEmptyValue: false
      tags:
        - Authentication
      responses:
        '204':
          description: Deleted successfully
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/reset-token:
    post:
      summary: Reset user token
      description: >
        Resets the 'QR' token for the currently logged in user. If there is no
        logged

        in user, it returns `401`.
      tags:
        - Authentication
      responses:
        '200':
          description: The user's new token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: >
                          A URL-safe base 64 encoded string that is used to
                          uniquely

                          identify the user when they scan their QR in a mess.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/reset-pass:
    post:
      summary: Generate reset password OTP
      description: >
        Generate a reset password OTP and email it to the user.

        Only MSIT and intern users are allowed to reset their password.

        This endpoint has a rate limit of once per minute.

        If the email is invalid, or the user is not MSIT or intern, it'll still
        succeed

        with a 204, but the email would not be sent.
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '204':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/reset-pass/verify:
    post:
      summary: Complete reset password flow
      description: |
        Send the OTP, email, and new password to reset the
        user's password
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  description: 6-digit decimal number sent as a string
                  example: '123456'
                password:
                  type: string
      responses:
        '204':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /mess/info:
    get:
      summary: Get information about all messes
      description: |
        **New in v2:** Does not return rates anymore
      tags:
        - Mess
      responses:
        '200':
          description: The information
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /mess/menus:
    get:
      summary: Get mess menus on a certain day
      tags:
        - Mess
      parameters:
        - name: 'on'
          in: query
          description: >-
            The date for which the menu should be fetched. Defaults to today's
            date.
          required: false
          schema:
            type: string
            format: date
            example: '1998-09-02'
      responses:
        '200':
          description: >
            The menu for each mess. The `days` property contains the names of

            each day, mapped against the menu for that day. Each day has items

            for breakfast, lunch, snacks and dinner.


            Menus for each mess are stored as a JSON object with unordered
            fields

            for each day ("sunday", "monday", etc.). Field values are another

            object whose keys are the meal ("breakfast", "lunch", "snacks",
            "dinner")

            and the values are arrays with item objects (with fields "category"
            and

            "name").


            Menus are stored weekwise with the week starting on a Sunday, so if
            you

            wish to request the menu that is correct for 2025-06-07 (Saturday),
            its

            corresponding menu would start on the Sunday of that week
            (2025-06-01).


            This fact is important to note if you want to display a
            weekly/monthly

            menu. Make sure to anchor your dates on Sundays to reflect changes
            in the

            menu correctly. As a collorary of this fact, the `effective_from`
            field

            of a menu will always fall on a Sunday.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        mess:
                          type: string
                          description: The ID of the mess.
                          example: yuktahar
                        updated_at:
                          type: string
                          format: date-time
                          description: The last time the menu was updated.
                        effective_from:
                          type: string
                          format: date
                          description: 'The date, after which, this menu comes into effect.'
                        days:
                          type: object
                          description: The menu for each day.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /mess/rates:
    get:
      summary: Get mess rates for a meal
      tags:
        - Mess
      parameters:
        - name: meal
          in: query
          description: The name of the meal.
          required: true
          schema:
            $ref: '#/components/schemas/Meal'
        - name: 'on'
          in: query
          description: Meal date for getting the rate. Defaults to today's date.
          required: false
          schema:
            type: string
            format: date
            example: '1998-09-02'
      responses:
        '200':
          description: >
            The rates of each mess for the given meal on the given date. Note
            that

            each property will be a category, and the array of items will
            contain

            the rate and the day if a specific day's rate is applicable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    propertyNames:
                      $ref: '#/components/schemas/Category'
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          mess:
                            type: string
                            example: yuktahar
                          day:
                            $ref: '#/components/schemas/Day'
                          rate:
                            type: integer
                            example: 4210
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /mess/capacities:
    get:
      summary: Get mess capacities for a meal
      tags:
        - Mess
      parameters:
        - name: meal
          in: query
          description: The name of the meal.
          required: true
          schema:
            $ref: '#/components/schemas/Meal'
        - name: 'on'
          in: query
          description: Meal date for getting the capacity. Defaults to today's date.
          required: false
          schema:
            type: string
            format: date
            example: '1998-09-02'
      responses:
        '200':
          description: >
            The capacities of each mess for the given meal on the given date.
            Note that

            each property will be a category, and the array of items will
            contain each

            mess' available and maximum capacity.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    propertyNames:
                      $ref: '#/components/schemas/Category'
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          mess:
                            type: string
                            example: yuktahar
                          available:
                            type: integer
                            example: 28
                          capacity:
                            type: integer
                            example: 420
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations:
    get:
      summary: Get registrations
      tags:
        - Registrations
      description: >
        Gets all registrations (past and upcoming) in a timeframe (max 2
        months).

        Both query parameters are inclusive.
      parameters:
        - name: from
          in: query
          allowEmptyValue: false
          required: true
          schema:
            type: string
            format: date
            example: '2025-01-01'
        - name: to
          in: query
          allowEmptyValue: false
          required: true
          schema:
            type: string
            format: date
            example: '2025-02-01'
      responses:
        '200':
          description: A list of registrations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MealRegistration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create/update a registration
      tags:
        - Registrations
      description: |
        **New in v2:** `guests` field.

        Registers the currently logged in user for a meal. If the registration
        already exists, then it updates it.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                meal_date:
                  type: string
                  format: date
                  example: '1998-09-02'
                meal_type:
                  $ref: '#/components/schemas/Meal'
                meal_mess:
                  type: string
                  example: kadamba-nonveg
                guests:
                  type: integer
                  descriptions: >
                    Number of guests this user is allowed to bring. The maximum
                    number

                    of allowed guests is definied in the user's attributes.
                  minimum: 0
                  required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MealRegistration'
        '204':
          description: The registration has already been completed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Either the registration window has closed or the mess is
            full in capacity.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                enum:
                                  - window-closed
                                  - capacity-exceeded
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registration:
    get:
      summary: Get one registration
      tags:
        - Registrations
      description: >
        Gets one registration for meal on date.  

        If meal is not provided, it returns registrations for all meals on that
        date

        in an object where key = meal and value = registration (the response
        body type

        you see below).  

        If date is not provided, today is assumed  

        This endpoint only returns *registered* meals.


        If a registration is missing for some meal, then 404 is returned if that
        meal

        is provided in the query string, otherwise, that meal's key will be
        missing from

        the returned object.
      parameters:
        - name: meal
          in: query
          allowEmptyValue: false
          required: false
          schema:
            $ref: '#/components/schemas/Meal'
        - name: date
          in: query
          allowEmptyValue: false
          required: false
          schema:
            type: string
            format: date
            example: '1998-09-02'
      responses:
        '200':
          description: The registration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MealRegistration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations/skipping:
    post:
      summary: Set a registration as skipped/unskipped
      tags:
        - Registrations
      description: |
        **New in v2**

        Sets the meal for a user to skipped/unskipped.
        Skipping indicates that the user will likely not avail the meal.
        It is to be used when the user runs out of cancellations for
        the given time duration. Skipping will still result in the user
        being charged for the meal.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                meal_date:
                  type: string
                  format: date
                  example: '1998-09-02'
                meal_type:
                  $ref: '#/components/schemas/Meal'
                meal_mess:
                  type: string
                  example: kadamba-nonveg
                skipping:
                  type: boolean
                  descriptions: |
                    To skip the meal or not
                  required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MealRegistration'
        '204':
          description: The registration has already been completed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Either the registration window has closed or the mess is
            full in capacity.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                enum:
                                  - window-closed
                                  - capacity-exceeded
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations/cancel:
    post:
      summary: Cancel a registration
      tags:
        - Registrations
      description: |
        Cancel a registration for the meal. If the registration
        is already cancelled, then it does nothing.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                meal_date:
                  type: string
                  format: date
                  example: '1998-09-02'
                meal_type:
                  $ref: '#/components/schemas/Meal'
      responses:
        '204':
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The cancellation window has closed.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: window-closed
        '404':
          $ref: '#/components/responses/NotFound'
        '424':
          description: Cannot cancel since no registration exists.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: not-registered
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations/uncancel:
    post:
      summary: Uncancel a registration
      tags:
        - Registrations
      description: |
        Uncancel a registration for the meal. If the registration
        is already uncancelled, then it does nothing.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                meal_date:
                  type: string
                  format: date
                  example: '1998-09-02'
                meal_type:
                  $ref: '#/components/schemas/Meal'
      responses:
        '204':
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The uncancellation window has closed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                      - type: object
                        properties:
                          code:
                            type: string
                            const: window-closed
        '404':
          $ref: '#/components/responses/NotFound'
        '424':
          description: Cannot uncancel since registration was not cancelled.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: not-cancelled
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations/feedback:
    post:
      summary: Provide feedback for a meal
      tags:
        - Registrations
        - Feedback
      description: |
        Provide anonymous feedback for a meal. If the user is not registered
        or has not availed this meal, it returns an error.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                meal_date:
                  type: string
                  format: date
                  example: '1998-09-02'
                meal_type:
                  $ref: '#/components/schemas/Meal'
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                remarks:
                  type: string
                  required: false
      responses:
        '204':
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Feedback has already been provided for this meal.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: already-exists
        '424':
          description: Cannot provide feedback since meal was not availed.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: not-availed
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registration/rating:
    get:
      summary: Get the average rating for a meal
      tags:
        - Registrations
        - Feedback
      description: |
        Gets the average and number of ratings for a meal in a mess
        on date. If the date is not provided, today is assumed. If
        the mess is not provided, data is returned as an object with
        the mess IDs as the keys, and the ratings objects as the
        values.

        If nobody has rated the meal, no rating(s) will be returned.
        The average rating on meals rated by users ∈ [1,5].

        If the meal's date occurs before the feedback window closes,
        the feedback will not be returned and a 403 error will be
        returned instead.
      parameters:
        - name: meal
          in: query
          allowEmptyValue: false
          required: true
          schema:
            $ref: '#/components/schemas/Meal'
        - name: mess
          in: query
          allowEmptyValue: true
          required: false
          schema:
            type: string
            example: kadamba-nonveg
        - name: date
          in: query
          allowEmptyValue: false
          required: false
          schema:
            type: string
            format: date
            example: '1998-09-02'
      responses:
        '200':
          description: The average rating.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schema/MealRating'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registrations/monthly:
    get:
      summary: Get monthly registration
      tags:
        - Registrations
      description: |
        Gets all monthly registrations (past and upcoming) for the current user.
      parameters:
        - name: month
          in: query
          description: The month registered for. Defaults to the current month.
          required: false
          schema:
            type: integer
            example: 9
        - name: year
          in: query
          description: The year registered for. Defaults to the current year.
          required: false
          schema:
            type: integer
            example: 1998
      responses:
        '200':
          description: The monthly registration made.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      registration:
                        $ref: '#/components/schemas/MonthlyRegistration'
                      snack_availments:
                        type: array
                        items:
                          $ref: '#/components/schemas/SnackAvailment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a monthly registration
      tags:
        - Registrations
      description: |
        Registers the currently logged in user at a certain mess for a month.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                month:
                  type: integer
                  example: 9
                year:
                  type: integer
                  example: 1998
                mess:
                  type: string
                  example: kadamba-nonveg
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MonthlyRegistration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Either the registration window has closed or the mess is
            full in capacity.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                enum:
                                  - window-closed
                                  - capacity-exceeded
        '409':
          description: The registration has already been completed.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: already-exists
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete a monthly registration
      tags:
        - Registrations
      description: >
        Deletes the monthly registration, without deleting individual meal
        registrations for that month.
      parameters:
        - name: month
          in: query
          description: The month registered for.
          required: true
          schema:
            type: integer
            example: 9
        - name: year
          in: query
          description: The year registered for.
          required: true
          schema:
            type: integer
            example: 1998
      responses:
        '204':
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            The registration window has closed.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      error:
                        allOf:
                          - $ref: '#/components/schemas/Error'
                          - type: object
                            properties:
                              code:
                                type: string
                                const: window-closed
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
